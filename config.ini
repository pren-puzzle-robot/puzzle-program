[logging]
level = DEBUG

[microcontroller]
transport = stub

[uart]
port = /dev/serial0
baudrate = 57600
timeout_seconds = 0.2
ack_timeout_seconds = 1.0
done_timeout_seconds = 30.0
wait_for_start = false

[camera]
transport = mock
mock_image = data/with_aruco2_flattened.JPG

[coordinate_mapper]
scale_x = 1.0
scale_y = 1.0

[coordinate_mapper.start]
x_min = 0.0
y_min = 0.0

[coordinate_mapper.end]
x_min = 0.0
y_min = 0.0

[solver]
algorithm = brute_force
min_area = 60000
threshold = none
